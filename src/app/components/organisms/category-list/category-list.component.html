<section class="categories" *ngIf="pageResponse | async as categories">
  <h2 class="categories__title">Categorías existentes</h2>
  <div class="categories__table--container">
    <app-table [info]="info"></app-table>
  </div>
  <app-pagination [page]="page" [pages]="pages" [totalPages]="totalPages" [getFunction]="getCategories.bind(this)"
    (pageChange)="onPageChanged($event)">
  </app-pagination>
</section>
