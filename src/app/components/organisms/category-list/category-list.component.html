<section class="categories" *ngIf="pageResponse | async as categories">
  <h2 class="categories__title">Categorías existentes</h2>
  <table class="categories__table">
    <thead class="categories__table-header">
      <th class="categories__table-header-item">ID</th>
      <th class="categories__table-header-item">Nombre</th>
      <th class="categories__table-header-item">Descripcion</th>
      <th class="categories__table-header-item">Acciones</th>
    </thead>
    <tbody class="categories__table-body" >
      <tr app-table-row *ngFor="let category of categories.content" [category]="category" class="categories__table-row" ></tr>
    </tbody>
  </table>

  <div class="pagination">
    <button class="pagination__button" [disabled]="page === 0" (click)="prevPage()" [class.invisible]="page === 0"><app-icon [icon]="prev"/></button>
    <button class="pagination__button" *ngFor="let p of pages" (click)="goPage(p)" [disabled]="p === page" [class.selected]="p === page">{{p + 1}}</button>
    <button class="pagination__button" [disabled]="page === totalPages - 1" (click)="nextPage()" [class.invisible]="page === totalPages - 1"><app-icon [icon]="next"/></button>
  </div>
</section>
