<aside class="sidebar" >
  <nav class="sidebar__nav">
    <ul class="sidebar__list" *ngFor="let item of data" >
      <li class="sidebar__item" routerLink="{{item.link}}" *ngIf="role === item.role" routerLinkActive="active">
        <app-icon [icon]="item.icon" class="sidebar__item--icon" ></app-icon>
        <p>{{item.label}}</p>
      </li>
    </ul>
  </nav>
</aside>
