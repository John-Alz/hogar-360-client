<input [type]="type" [placeholder]="placeholder" [formControl]="control" class="input" [ngClass]="{
  'input--error': control.touched && control.invalid
}" />
<div class="input__errros" *ngIf="control?.touched && control?.invalid">
  <small class="input__errros--item"   *ngIf="control?.touched && control?.invalid && control?.errors">
    {{getError(control)}}
  </small>
</div>
