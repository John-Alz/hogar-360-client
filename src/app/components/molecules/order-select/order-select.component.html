<div class="order-select">
  <label class="order-select__label" for="order-select__dropdown">{{label}}:</label>
  <select class="order-select__dropdown" [formControl]="control" id="order-select__dropdown" name="order">
    <option class="order-select__option" value="true" selected>A-Z</option>
    <option class="order-select__option" value="false">Z-A</option>
  </select>
</div>
